<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Forgot Password | Travel Buddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --sand:        #f5efe6;
      --sand-2:      #ede4d8;
      --sand-3:      #d8c9b6;
      --terracotta:  #c26a45;
      --terra-dark:  #a3512f;
      --terra-light: #e89070;
      --ocean:       #2a6478;
      --ocean-light: #4a8fa8;
      --ocean-dark:  #1d4f61;
      --ink:         #1c1410;
      --ink-2:       #5c4a3d;
      --ink-3:       #9c8878;
      --white:       #fdfaf7;
      --error-bg:    #fef2ee;
      --error-border:#e4a090;
      --error-text:  #8b3a22;
      --success-bg:  #eef6f0;
      --success-border:#88c49a;
      --success-text:#2a6b3e;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      min-height: 100dvh;
      background: var(--ocean-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* ── BACKGROUND ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(74,143,168,0.45) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(194,106,69,0.2) 0%, transparent 55%),
        linear-gradient(160deg, var(--ocean-dark) 0%, #122a36 50%, #0e1e28 100%);
      z-index: 0;
    }

    /* Subtle noise texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* Floating travel icons */
    .bg-icons {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .bg-icon {
      position: absolute;
      font-size: 28px;
      opacity: 0.06;
      animation: drift linear infinite;
    }
    .bg-icon:nth-child(1)  { top: 8%;  left: 12%; font-size: 32px; animation-duration: 18s; animation-delay: 0s; }
    .bg-icon:nth-child(2)  { top: 22%; left: 78%; font-size: 24px; animation-duration: 22s; animation-delay: -5s; }
    .bg-icon:nth-child(3)  { top: 55%; left: 6%;  font-size: 20px; animation-duration: 16s; animation-delay: -8s; }
    .bg-icon:nth-child(4)  { top: 70%; left: 85%; font-size: 30px; animation-duration: 25s; animation-delay: -2s; }
    .bg-icon:nth-child(5)  { top: 88%; left: 40%; font-size: 22px; animation-duration: 20s; animation-delay: -12s; }

    @keyframes drift {
      0%   { transform: translateY(0)   rotate(0deg); }
      50%  { transform: translateY(-18px) rotate(6deg); }
      100% { transform: translateY(0)   rotate(0deg); }
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      background: var(--white);
      border-radius: 24px;
      box-shadow:
        0 8px 40px rgba(0,0,0,0.28),
        0 1px 0 rgba(255,255,255,0.06) inset;
      overflow: hidden;
      animation: card-enter 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes card-enter {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    /* ── CARD TOP STRIPE ── */
    .card-stripe {
      height: 5px;
      background: linear-gradient(90deg,
        var(--ocean)       0%,
        var(--ocean-light) 40%,
        var(--terracotta)  70%,
        var(--terra-light) 100%
      );
    }

    /* ── CARD BODY ── */
    .card-body {
      padding: 36px 36px 32px;
    }

    /* ── LOGO / BRAND ── */
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      animation: fade-up 0.5s 0.1s both;
    }
    .brand-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--ocean), var(--ocean-light));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 2px 12px rgba(42,100,120,0.35);
    }
    .brand-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--ocean-dark);
      letter-spacing: -0.01em;
    }

    /* ── HEADINGS ── */
    .card-header {
      margin-bottom: 24px;
      animation: fade-up 0.5s 0.15s both;
    }
    .card-header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.15;
      margin-bottom: 7px;
    }
    .card-header p {
      font-size: 14px;
      color: var(--ink-3);
      line-height: 1.5;
    }

    /* ── ALERT MESSAGES ── */
    .alert {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 13.5px;
      line-height: 1.45;
      font-weight: 500;
      margin-bottom: 20px;
      border: 1px solid transparent;
      animation: fade-up 0.35s both;
    }
    .alert-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    .alert-error {
      background: var(--error-bg);
      border-color: var(--error-border);
      color: var(--error-text);
    }
    .alert-success {
      background: var(--success-bg);
      border-color: var(--success-border);
      color: var(--success-text);
    }

    /* ── FORM ── */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
      animation: fade-up 0.5s 0.2s both;
    }

    .form-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-2);
      letter-spacing: 0.02em;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-icon {
      position: absolute;
      left: 13px;
      color: var(--ink-3);
      display: flex;
      pointer-events: none;
      transition: color 0.2s;
    }
    .input-wrap:focus-within .input-icon { color: var(--terracotta); }

    .form-input {
      width: 100%;
      padding: 11px 14px 11px 40px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--ink);
      background: var(--sand);
      border: 1.5px solid var(--sand-3);
      border-radius: 12px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }
    .form-input::placeholder { color: var(--ink-3); }
    .form-input:focus {
      border-color: var(--terracotta);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(194,106,69,0.14);
    }
    .form-input.input-error {
      border-color: var(--error-border);
      background: var(--error-bg);
    }
    .form-input.input-error:focus {
      box-shadow: 0 0 0 3px rgba(194,106,69,0.12);
    }

    .field-hint {
      font-size: 12px;
      color: var(--error-text);
      font-weight: 500;
      display: none;
      align-items: center;
      gap: 4px;
    }
    .field-hint.visible { display: flex; }

    /* ── SUBMIT BUTTON ── */
    .submit-btn {
      width: 100%;
      padding: 13px 20px;
      background: linear-gradient(135deg, var(--terracotta), var(--terra-dark));
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      box-shadow: 0 3px 14px rgba(194,106,69,0.38);
      transition: transform 0.15s, box-shadow 0.15s, filter 0.15s;
      position: relative;
      overflow: hidden;
      animation: fade-up 0.5s 0.25s both;
    }
    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 5px 20px rgba(194,106,69,0.45);
      filter: brightness(1.04);
    }
    .submit-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(194,106,69,0.3);
    }
    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Loading spinner */
    .spinner {
      width: 17px;
      height: 17px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    .submit-btn.loading .spinner { display: block; }
    .submit-btn.loading .btn-label { opacity: 0.75; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 22px 0 18px;
      animation: fade-up 0.5s 0.3s both;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--sand-3);
    }
    .divider span {
      font-size: 12px;
      color: var(--ink-3);
      font-weight: 500;
      white-space: nowrap;
    }

    /* ── BACK LINK ── */
    .back-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      color: var(--ocean);
      padding: 10px;
      border-radius: 10px;
      border: 1.5px solid var(--sand-3);
      transition: background 0.18s, border-color 0.18s, color 0.18s;
      animation: fade-up 0.5s 0.32s both;
    }
    .back-link:hover {
      background: var(--sand);
      border-color: var(--ocean-light);
      color: var(--ocean-dark);
    }

    /* ── FADE UP ANIMATION ── */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 460px) {
      .card-body { padding: 28px 22px 24px; }
      .card-header h1 { font-size: 22px; }
    }

    /* ── SR ONLY ── */
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>

  <!-- Floating background icons -->
  <div class="bg-icons" aria-hidden="true">
    <span class="bg-icon">✈️</span>
    <span class="bg-icon">🧭</span>
    <span class="bg-icon">🗺️</span>
    <span class="bg-icon">🏔️</span>
    <span class="bg-icon">⛵</span>
  </div>

  <main class="card" role="main">
    <div class="card-stripe"></div>
    <div class="card-body">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-icon" aria-hidden="true">✈️</div>
        <span class="brand-name">Travel Buddy</span>
      </div>

      <!-- Heading -->
      <header class="card-header">
        <h1>Forgot password?</h1>
        <p>Enter your username and we'll generate a secure reset link for you.</p>
      </header>

      <!-- FIX: role="alert" so screen readers announce flash messages immediately -->
      <!-- FIX: semantic classes instead of inline color styles -->

      {% if error %}
      <div class="alert alert-error" role="alert" aria-live="assertive">
        <span class="alert-icon" aria-hidden="true">⚠️</span>
        <span>{{ error }}</span>
      </div>
      {% endif %}

      {% if success %}
      <div class="alert alert-success" role="status" aria-live="polite">
        <span class="alert-icon" aria-hidden="true">✅</span>
        <span>{{ success }}</span>
      </div>
      {% endif %}

      <!--
        FIX 1: action="{{ url_for('forgot_password') }}" — explicit action, not implicit
        FIX 2: novalidate lets us show custom styled errors instead of browser defaults
        FIX 3: autocomplete="on" improves UX
      -->
      <form
        id="forgotForm"
        method="POST"
        action="{{ url_for('forgot_password') }}"
        novalidate
        autocomplete="on"
      >
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-group">
          <!-- FIX: explicit <label> linked via for/id — was completely missing -->
          <label class="form-label" for="username">Username</label>

          <div class="input-wrap">
            <!-- Input icon -->
            <span class="input-icon" aria-hidden="true">
              <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="5.5" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                <path d="M2.5 13c0-2.485 2.462-4.5 5.5-4.5s5.5 2.015 5.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </span>

            <!--
              FIX: autocomplete="username" helps password managers
              FIX: required attribute prevents empty submission
              FIX: aria-describedby links to error hint for screen readers
              FIX: inputmode and spellcheck set for better mobile UX
            -->
            <input
              id="username"
              class="form-input"
              type="text"
              name="username"
              placeholder="e.g. john_doe"
              required
              autocomplete="username"
              spellcheck="false"
              autocorrect="off"
              autocapitalize="off"
              aria-required="true"
              aria-describedby="usernameHint"
              value="{{ request.form.get('username', '') }}"
            />
          </div>

          <!-- FIX: visible + accessible inline field error -->
          <span class="field-hint" id="usernameHint" role="alert">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="5.5" stroke="currentColor" stroke-width="1.4"/>
              <path d="M6.5 3.5v3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              <circle cx="6.5" cy="9" r="0.7" fill="currentColor"/>
            </svg>
            Please enter your username.
          </span>
        </div>

        <button class="submit-btn" id="submitBtn" type="submit">
          <span class="spinner" aria-hidden="true"></span>
          <span class="btn-label">Generate Reset Link</span>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </form>

      <div class="divider"><span>or</span></div>

      <!-- FIX: url_for() preserved; now wrapped in a styled accessible link -->
      <a href="{{ url_for('login') }}" class="back-link" aria-label="Back to login page">
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <path d="M9.5 3L5 7.5l4.5 4.5" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Back to Login
      </a>

    </div><!-- /.card-body -->
  </main>

  <script>
  (function () {
    'use strict';

    const form      = document.getElementById('forgotForm');
    const input     = document.getElementById('username');
    const hint      = document.getElementById('usernameHint');
    const submitBtn = document.getElementById('submitBtn');

    /* ── CLIENT-SIDE VALIDATION ── */
    // FIX: validate before submission so empty values never hit the server
    function validateUsername() {
      const val = input.value.trim();
      if (!val) {
        input.classList.add('input-error');
        hint.textContent = 'Please enter your username.';
        hint.classList.add('visible');
        input.setAttribute('aria-invalid', 'true');
        return false;
      }
      if (val.length < 3) {
        input.classList.add('input-error');
        hint.textContent = 'Username must be at least 3 characters.';
        hint.classList.add('visible');
        input.setAttribute('aria-invalid', 'true');
        return false;
      }
      // Basic: only allow alphanumeric, underscores, hyphens
      if (!/^[a-zA-Z0-9_\-\.]+$/.test(val)) {
        input.classList.add('input-error');
        hint.textContent = 'Username contains invalid characters.';
        hint.classList.add('visible');
        input.setAttribute('aria-invalid', 'true');
        return false;
      }
      clearError();
      return true;
    }

    function clearError() {
      input.classList.remove('input-error');
      hint.classList.remove('visible');
      input.removeAttribute('aria-invalid');
    }

    // Clear error on input change
    input.addEventListener('input', () => {
      if (input.value.trim()) clearError();
    });

    // Validate on blur
    input.addEventListener('blur', () => {
      if (input.value.length > 0) validateUsername();
    });

    // Handle form submit
    form.addEventListener('submit', (e) => {
      if (!validateUsername()) {
        e.preventDefault();
        input.focus();
        return;
      }

      // Loading state
      submitBtn.classList.add('loading');
      submitBtn.disabled = true;
      // Re-enable after 8s fallback in case server is slow
      setTimeout(() => {
        submitBtn.classList.remove('loading');
        submitBtn.disabled = false;
      }, 8000);
    });

    // Trim on submit (removes accidental spaces)
    form.addEventListener('formdata', (e) => {
      const username = e.formData.get('username');
      if (username) e.formData.set('username', username.trim());
    });

  })();
  </script>
</body>
</html>
