<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Reset Password | Travel Buddy</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#f0ede8;--surface:#faf9f7;--surface2:#f2efe9;--border:rgba(0,0,0,.08);
      --text:#1a1714;--muted:#847d76;--primary:#e8622a;--primary-dark:#c44e1c;--danger:#c0392b;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;display:grid;place-items:center;padding:20px;
      font-family:'DM Sans',sans-serif;background:radial-gradient(circle at top right,#f9f3ed,var(--bg));color:var(--text);
    }
    .card{
      width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border);
      border-radius:18px;box-shadow:0 10px 36px rgba(0,0,0,.09);padding:30px;
    }
    h1{font-family:'Sora',sans-serif;font-size:24px;font-weight:800;line-height:1.2;margin-bottom:8px}
    p{font-size:14px;color:var(--muted);margin-bottom:20px}
    .err{margin-bottom:14px;padding:10px 12px;border-radius:10px;background:#fde8e6;color:var(--danger);font-size:13px;font-weight:600}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    label{font-size:12px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;color:#5a534d}
    input{
      width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:10px;background:#fff;
      font-size:14px;font-family:'DM Sans',sans-serif;color:var(--text);
    }
    input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(232,98,42,.2)}
    .btn{
      width:100%;border:none;border-radius:11px;padding:12px 14px;cursor:pointer;
      background:var(--primary);color:#fff;font-size:14px;font-weight:800;
      transition:background .2s,transform .2s;
    }
    .btn:hover{background:var(--primary-dark);transform:translateY(-1px)}
    .hint{margin-top:12px;font-size:12px;color:var(--muted)}
  </style>
</head>
<body>
  <main class="card">
    <h1>Set a New Password</h1>
    <p>Create a strong password for your account.</p>

    {% if error %}
      <div class="err" role="alert">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('reset_password', token=token) }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
      <div class="field">
        <label for="password">New Password</label>
        <input id="password" name="password" type="password" minlength="8" maxlength="128" required autocomplete="new-password" />
      </div>
      <button class="btn" type="submit">Update Password</button>
    </form>

    <div class="hint">Minimum 8 characters. Use letters and numbers.</div>
  </main>
</body>
</html>
